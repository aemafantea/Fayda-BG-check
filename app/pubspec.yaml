name: fayda_bg_check
description: "Fayda BG-Check — Employee background check & HR consultant platform."
publish_to: 'none'
version: 0.2.0+4

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.6

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Forms
  flutter_form_builder: ^9.3.0
  form_builder_validators: ^11.0.0

  # Auth helpers
  url_launcher: ^6.3.0
  app_links: ^3.5.1
  flutter_secure_storage: ^9.2.2

  # File handling
  file_picker: ^8.0.6
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # PDF
  printing: ^5.13.1
  pdf: ^3.11.0

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.2
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  generate: true
